name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Each job builds natively on its runner, so no --target / cross
      # toolchain is needed; the triple only labels the archive.
      - name: Build (frontend embedded)
        run: |
          npm ci --prefix web
          npm run build --prefix web
          cargo build --release

      - name: Package
        run: |
          STAGE="outcrop-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp target/release/outcrop LICENSE README.md "$STAGE"/
          tar czf "$STAGE.tar.gz" "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Checksums
        run: sha256sum *.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            SHA256SUMS
          generate_release_notes: true
